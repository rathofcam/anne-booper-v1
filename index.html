<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anne Booper</title>

<style>
body {
    margin: 0;
    background: linear-gradient(45deg, lavender, pink, lightblue, #fff0f5);
    background-size: 400% 400%;
    animation: bgMove 8s infinite alternate;
    height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

@keyframes bgMove {
    0% { background-position: left; }
    100% { background-position: right; }
}

#mainUI {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    flex-direction: column;
    overflow-y: auto;
    padding-top: 20px;
    padding-bottom: 220px;
}

#anne {
    width: 420px;
    max-width: 85vw;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 0 25px hotpink;
}

.boop {
    animation: boopAnim 0.25s ease;
}

@keyframes boopAnim {
    50% { transform: scale(1.15) rotate(4deg); }
}

#text, #counter {
    margin-top: 10px;
    background: white;
    padding: 10px;
    border-radius: 10px;
}

#shop, #saveBox, #cheatBox {
    display: none;
    margin-top: 12px;
    background: white;
    padding: 12px;
    border-radius: 14px;
    box-shadow: 0 0 14px hotpink;
}

button {
    margin: 4px;
    padding: 8px;
    border-radius: 10px;
    border: none;
    background: hotpink;
    color: white;
    font-weight: bold;
}

input {
    padding: 6px;
    border-radius: 8px;
    border: 2px solid hotpink;
}

.particle {
    position: absolute;
    animation: floatUp 1s forwards;
}

@keyframes floatUp {
    to { transform: translateY(-80px); opacity: 0; }
}

#hyperCodeBox {
    display: none;
    position: fixed;
    top: 12px;
    right: 12px;
    background: white;
    padding: 10px;
    border-radius: 12px;
}
</style>
</head>

<body>

<div id="mainUI">
    <img id="anne" src="Anne.png">
    <div id="text">Click Anne 👆</div>
    <div id="counter">Boops: 0</div>

    <div id="shop">
        <button id="buyBouncing">Bouncy Anne</button>
        <button id="buyHyper">Hyper Anne</button>
        <button id="buyCannon">Confetti</button>
        <button id="buyDuplicater">Duplicater</button>
    </div>

    <div id="saveBox">
        <select id="saveSlot"></select>
        <button id="saveGame">Save</button>
        <button id="loadGame">Load</button>
    </div>

    <div id="cheatBox">
        <input id="cheatInput">
        <button id="useCheat">Use</button>
    </div>
</div>

<div id="hyperCodeBox">
    <input id="hyperCodeInput">
    <button id="submitHyperCode">Unlock</button>
</div>

<script>

/* ===== BASE ===== */

const messages = ["Psych time!", "Anne is watching.", "Boop again."];

let totalBoops = 0;
let spendableBoops = 0;
let perClick = 1;

/* ===== NEW SYSTEMS ===== */

let currentImage = "Anne.png";
let customMessages = [];
let usingCustomMessages = false;

/* ===== ELEMENTS ===== */

const img = document.getElementById("anne");
const text = document.getElementById("text");
const counter = document.getElementById("counter");

/* ===== IMAGE CHANGER ===== */

const imageChangerBox = document.createElement("div");
imageChangerBox.innerHTML = `
<h3>Image</h3>
<button id="img1">1</button>
<button id="img2">2</button>
<button id="img3">3</button>
<button id="img4">4</button>
`;
document.getElementById("mainUI").appendChild(imageChangerBox);

function setAnneImage(src) {
    currentImage = src;
    img.src = src;
}

document.getElementById("img1").onclick = () => setAnneImage("Anne.png");
document.getElementById("img2").onclick = () => setAnneImage("anne2.png");
document.getElementById("img3").onclick = () => setAnneImage("anne3.png");
document.getElementById("img4").onclick = () => setAnneImage("anne4.png");

/* ===== CUSTOM MESSAGES ===== */

const customBox = document.createElement("div");
customBox.innerHTML = `
<input id="customInput">
<button id="addMsg">Add</button>
<button id="toggleCustom">Toggle</button>
`;
document.getElementById("mainUI").appendChild(customBox);

document.getElementById("addMsg").onclick = () => {
    const val = document.getElementById("customInput").value;
    if (val) customMessages.push(val);
};

document.getElementById("toggleCustom").onclick = () => {
    usingCustomMessages = !usingCustomMessages;
};

/* ===== MESSAGE SELECTOR ===== */

function getMsg() {
    if (usingCustomMessages && customMessages.length > 0) {
        return customMessages[Math.floor(Math.random() * customMessages.length)];
    }
    return messages[Math.floor(Math.random() * messages.length)];
}

/* ===== BOOP ===== */

function boop(e) {
    totalBoops++;
    spendableBoops++;

    text.textContent = getMsg();

    img.classList.add("boop");
    setTimeout(() => img.classList.remove("boop"), 200);

    counter.textContent = "Boops: " + totalBoops;
}

img.addEventListener("click", boop);
/* ===== 2/4 — STATE + SHOP + BOOP LOGIC ===== */

let effectsBought = false;
let cannonBought = false;
let duplicaterLevel = 0;

let cheatCodeAdderUnlocked = false;
let imageChangerUnlocked = false;
let customMessagesUnlocked = false;

let bouncingAnneCount = 0;
const maxBouncingAnnes = 15;
let bouncingAnnes = [];
let bounceAnimationId = null;

let hyperBouncingBought = false;
let hyperBouncingAnne = null;
let hyperInterval = null;

let autoTier = 0;
let autoOneInterval = null;
let autoTwoInterval = null;
let autoThreeInterval = null;

let resetting = false;
let lastClickTime = Date.now();

const PRICE_BOUNCY = 15;
const PRICE_HYPER = 45;
const PRICE_CONFETTI = 50;
const PRICE_DUPLICATER = 150;
const PRICE_AUTO_ONE = 1500;
const PRICE_AUTO_TWO = 10000;
const PRICE_AUTO_THREE = 50000;

const shop = document.getElementById("shop");
const saveBox = document.getElementById("saveBox");
const cheatBox = document.getElementById("cheatBox");

const buyBouncing = document.getElementById("buyBouncing");
const buyHyper = document.getElementById("buyHyper");
const buyCannon = document.getElementById("buyCannon");
const buyDuplicater = document.getElementById("buyDuplicater");

const saveSlot = document.getElementById("saveSlot");
const saveGameBtn = document.getElementById("saveGame");
const loadGameBtn = document.getElementById("loadGame");

const cheatInput = document.getElementById("cheatInput");
const useCheat = document.getElementById("useCheat");

const hyperCodeBox = document.getElementById("hyperCodeBox");
const hyperCodeInput = document.getElementById("hyperCodeInput");
const submitHyperCode = document.getElementById("submitHyperCode");

/* ===== SAVE SLOTS ===== */

for (let i = 1; i <= 50; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = "Save Slot " + i;
    saveSlot.appendChild(option);
}

/* ===== AUTO SHOP BUTTONS ===== */

const autoOneBtn = document.createElement("button");
autoOneBtn.id = "buyAutoOne";
autoOneBtn.textContent = "Auto Booper I (1500)";
shop.appendChild(autoOneBtn);

const autoTwoBtn = document.createElement("button");
autoTwoBtn.id = "buyAutoTwo";
autoTwoBtn.textContent = "Auto Booper II (10000)";
shop.appendChild(autoTwoBtn);

const autoThreeBtn = document.createElement("button");
autoThreeBtn.id = "buyAutoThree";
autoThreeBtn.textContent = "Auto Booper III (50000)";
shop.appendChild(autoThreeBtn);

/* ===== CHEAT BUTTON NEXT TO MESSAGE ===== */

const cheatSideButton = document.createElement("button");
cheatSideButton.id = "cheatSideButton";
cheatSideButton.textContent = "🎁 Cheat Codes";
cheatSideButton.style.display = "none";
text.insertAdjacentElement("afterend", cheatSideButton);

cheatSideButton.onclick = event => {
    event.stopPropagation();
    cheatBox.style.display = "block";
    cheatInput.focus();
    text.textContent = "Enter a cheat code.";
};

/* ===== COUNTER / UI ===== */

function updateCounter() {
    perClick = Math.pow(2, duplicaterLevel);

    let autoText = "None";
    if (autoTier === 1) autoText = "Tier 1";
    if (autoTier === 2) autoText = "Tier 2";
    if (autoTier === 3) autoText = "Tier 3";

    counter.textContent =
        "Boops: " + Math.floor(totalBoops) +
        " | Spendable: " + Math.floor(spendableBoops) +
        " | Per Click: " + perClick +
        " | Duplicater: " + duplicaterLevel + "/10" +
        " | Bouncy Annes: " + bouncingAnneCount + "/15" +
        " | Auto: " + autoText;

    shop.style.display = totalBoops >= 75 ? "block" : "none";
    saveBox.style.display = totalBoops >= 75 ? "block" : "none";

    if (cheatCodeAdderUnlocked) {
        cheatBox.style.display = "block";
        cheatSideButton.style.display = "inline-block";
    } else {
        cheatSideButton.style.display = "none";
    }

    imageChangerBox.style.display = imageChangerUnlocked ? "block" : "none";
    customBox.style.display = customMessagesUnlocked ? "block" : "none";

    buyBouncing.disabled = spendableBoops < PRICE_BOUNCY || bouncingAnneCount >= maxBouncingAnnes;
    buyHyper.disabled = spendableBoops < PRICE_HYPER || totalBoops < PRICE_HYPER || hyperBouncingBought;
    buyCannon.disabled = spendableBoops < PRICE_CONFETTI || cannonBought;
    buyDuplicater.disabled = spendableBoops < PRICE_DUPLICATER || duplicaterLevel >= 10;

    autoOneBtn.disabled = spendableBoops < PRICE_AUTO_ONE || autoTier >= 1;
    autoTwoBtn.disabled = spendableBoops < PRICE_AUTO_TWO || autoTier >= 2;
    autoThreeBtn.disabled = spendableBoops < PRICE_AUTO_THREE || autoTier >= 3;
}

/* ===== PARTICLES ===== */

function showParticles(x, y) {
    if (!effectsBought) return;

    const symbols = ["✨", "💖", "💥", "🌸", "⭐", "💫"];

    for (let i = 0; i < 12; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        p.style.left = (x + Math.random() * 120 - 60) + "px";
        p.style.top = (y + Math.random() * 120 - 60) + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }
}

function confettiCannon() {
    const confetti = ["🎉", "🎊", "✨", "💥", "🌈"];

    for (let i = 0; i < 35; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.textContent = confetti[Math.floor(Math.random() * confetti.length)];
        p.style.left = Math.random() * window.innerWidth + "px";
        p.style.top = Math.random() * window.innerHeight + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }
}

/* ===== BOOPS ===== */

function addBoops(amount, fromAuto = false) {
    if (resetting) return;

    totalBoops += amount;
    spendableBoops += amount;

    if (totalBoops >= 100000 && totalBoops < 125000) {
        document.body.classList.add("cursed");
        if (!fromAuto) text.textContent = "wow. Real dedication.";
    }

    if (totalBoops >= 125000) {
        triggerBlueScreenReset();
        return;
    }

    updateCounter();
}

function getBoopMessage() {
    if (usingCustomMessages && customMessages.length > 0) {
        return customMessages[Math.floor(Math.random() * customMessages.length)];
    }

    return messages[Math.floor(Math.random() * messages.length)];
}

function boop(event) {
    if (resetting) return;

    lastClickTime = Date.now();
    addBoops(perClick, false);

    if (resetting) return;

    if (totalBoops >= 1000 && totalBoops < 1000 + perClick) {
        text.textContent = "STOP BOOPING ME IM PICKING MY ACNE!";
    } else if (totalBoops >= 75 && totalBoops < 75 + perClick) {
        text.textContent = "SHOP UNLOCKED!";
    } else if (totalBoops >= 45 && totalBoops < 45 + perClick) {
        text.textContent = "HYPER ANNE UNLOCKED!";
    } else {
        text.textContent = getBoopMessage();
    }

    img.classList.add("boop");
    setTimeout(() => img.classList.remove("boop"), 250);

    const x = event.clientX || window.innerWidth / 2;
    const y = event.clientY || window.innerHeight / 2;

    showParticles(x, y);
    if (cannonBought) confettiCannon();

    updateCounter();
}

img.onclick = event => {
    event.stopPropagation();
    boop(event);
};

/* ===== HYPER CODE ===== */

submitHyperCode.onclick = event => {
    event.stopPropagation();

    const code = hyperCodeInput.value.trim();

    if (code === "Hwi7k%") {
        cheatCodeAdderUnlocked = true;
        imageChangerUnlocked = true;
        customMessagesUnlocked = true;

        hyperCodeBox.style.display = "none";
        hyperCodeInput.value = "";

        text.textContent = "Hyper code accepted! Cheat Codes, Image Changer, and Custom Messages unlocked!";
        updateCounter();
    } else {
        text.textContent = "Wrong Hyper Anne code.";
    }
};

hyperCodeBox.addEventListener("click", event => event.stopPropagation());
hyperCodeBox.addEventListener("pointerdown", event => event.stopPropagation());
hyperCodeInput.addEventListener("click", event => event.stopPropagation());
hyperCodeInput.addEventListener("pointerdown", event => event.stopPropagation());/* ===== BOUNCY ANNES ===== */

function createBouncingAnne(srcOverride = null) {
    if (bouncingAnneCount >= maxBouncingAnnes) return;

    const anne = {
        el: document.createElement("img"),
        x: Math.random() * (window.innerWidth - 130),
        y: Math.random() * (window.innerHeight - 130),
        dx: (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 2),
        dy: (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 2),
        size: 130,
        isEasterEgg: false
    };

    const imgSrc = srcOverride || currentImage;

    anne.el.src = imgSrc;
    anne.el.className = "bouncingAnne";

    anne.el.addEventListener("click", e => {
        e.stopPropagation();
        boop(e);
    });

    document.body.appendChild(anne.el);

    bouncingAnnes.push(anne);
    bouncingAnneCount++;

    startBounceLoop();
    updateCounter();
}

/* ===== EASTER EGG ANNE (SPECIAL) ===== */

function createOtherBouncyAnne() {
    const anne = {
        el: document.createElement("img"),
        x: Math.random() * (window.innerWidth - 130),
        y: Math.random() * (window.innerHeight - 130),
        dx: 5,
        dy: 5,
        size: 130,
        isEasterEgg: true
    };

    anne.el.src = "anne3.png";
    anne.el.className = "bouncingAnne";

    anne.el.style.boxShadow = "0 0 30px gold";

    anne.el.addEventListener("click", e => {
        e.stopPropagation();
        addBoops(10); // bonus boops
        text.textContent = "✨ Secret Anne gave bonus boops!";
    });

    document.body.appendChild(anne.el);
    bouncingAnnes.push(anne);

    startBounceLoop();
}

/* ===== HYPER ANNE ===== */

function createHyperAnne() {
    if (hyperBouncingBought) return;

    hyperBouncingBought = true;

    hyperBouncingAnne = {
        el: document.createElement("img"),
        x: Math.random() * (window.innerWidth - 150),
        y: Math.random() * (window.innerHeight - 150),
        dx: 6,
        dy: 6,
        size: 150
    };

    hyperBouncingAnne.el.src = currentImage;
    hyperBouncingAnne.el.className = "hyperBouncingAnne";

    hyperBouncingAnne.el.addEventListener("click", e => {
        e.stopPropagation();

        hyperCodeBox.style.display = "block";
        hyperCodeInput.focus();

        text.textContent = "Enter the secret code.";
    });

    document.body.appendChild(hyperBouncingAnne.el);

    startHyperIncome();
    startBounceLoop();
    updateCounter();
}

/* ===== REMOVE ALL ===== */

function removeAllAnnes() {
    bouncingAnnes.forEach(a => a.el.remove());
    bouncingAnnes = [];
    bouncingAnneCount = 0;

    if (hyperBouncingAnne) {
        hyperBouncingAnne.el.remove();
        hyperBouncingAnne = null;
    }

    hyperBouncingBought = false;

    if (bounceAnimationId) {
        cancelAnimationFrame(bounceAnimationId);
        bounceAnimationId = null;
    }

    stopHyperIncome();
}

/* ===== BOUNCE LOOP ===== */

function startBounceLoop() {
    if (!bounceAnimationId) {
        bounceAnimationId = requestAnimationFrame(animateAnnes);
    }
}

function animateAnnes() {
    const all = [...bouncingAnnes];
    if (hyperBouncingAnne) all.push(hyperBouncingAnne);

    /* MOVE */
    all.forEach(a => {
        a.x += a.dx;
        a.y += a.dy;

        if (a.x <= 0 || a.x + a.size >= window.innerWidth) {
            a.dx *= -1;
            a.x = Math.max(0, Math.min(a.x, window.innerWidth - a.size));
            if (cannonBought) confettiCannon();
        }

        if (a.y <= 0 || a.y + a.size >= window.innerHeight) {
            a.dy *= -1;
            a.y = Math.max(0, Math.min(a.y, window.innerHeight - a.size));
            if (cannonBought) confettiCannon();
        }
    });

    /* COLLISIONS */
    for (let i = 0; i < all.length; i++) {
        for (let j = i + 1; j < all.length; j++) {
            const a = all[i];
            const b = all[j];

            const dx = (b.x + b.size / 2) - (a.x + a.size / 2);
            const dy = (b.y + b.size / 2) - (a.y + a.size / 2);
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = (a.size / 2 + b.size / 2);

            if (dist < minDist && dist > 0) {
                const nx = dx / dist;
                const ny = dy / dist;
                const overlap = minDist - dist;

                a.x -= nx * overlap / 2;
                a.y -= ny * overlap / 2;
                b.x += nx * overlap / 2;
                b.y += ny * overlap / 2;

                const tempDX = a.dx;
                const tempDY = a.dy;

                a.dx = b.dx;
                a.dy = b.dy;
                b.dx = tempDX;
                b.dy = tempDY;

                if (cannonBought) confettiCannon();
            }
        }
    }

    /* APPLY */
    all.forEach(a => {
        a.el.style.left = a.x + "px";
        a.el.style.top = a.y + "px";
    });

    if (all.length > 0) {
        bounceAnimationId = requestAnimationFrame(animateAnnes);
    } else {
        bounceAnimationId = null;
    }
}

/* ===== HYPER PASSIVE BOOPS ===== */

function startHyperIncome() {
    stopHyperIncome();

    hyperInterval = setInterval(() => {
        addBoops(1, true);
    }, 60000);
}

function stopHyperIncome() {
    if (hyperInterval) {
        clearInterval(hyperInterval);
        hyperInterval = null;
    }
}/* ===== AUTO BOOPERS ===== */

function startAutoBoopers() {
    clearAutoBoopers();

    if (autoTier >= 1) {
        autoOneInterval = setInterval(() => addBoops(1, true), 5000);
    }
    if (autoTier >= 2) {
        autoTwoInterval = setInterval(() => addBoops(1, true), 1000);
    }
    if (autoTier >= 3) {
        autoThreeInterval = setInterval(() => addBoops(1, true), 50);
    }
}

function clearAutoBoopers() {
    if (autoOneInterval) clearInterval(autoOneInterval);
    if (autoTwoInterval) clearInterval(autoTwoInterval);
    if (autoThreeInterval) clearInterval(autoThreeInterval);

    autoOneInterval = null;
    autoTwoInterval = null;
    autoThreeInterval = null;
}

/* ===== SHOP BUTTONS ===== */

buyBouncing.onclick = () => {
    if (spendableBoops >= PRICE_BOUNCY && bouncingAnneCount < maxBouncingAnnes) {
        spendableBoops -= PRICE_BOUNCY;
        createBouncingAnne();
        text.textContent = "Bouncy Anne bought!";
        updateCounter();
    }
};

buyHyper.onclick = () => {
    if (spendableBoops >= PRICE_HYPER && totalBoops >= PRICE_HYPER && !hyperBouncingBought) {
        spendableBoops -= PRICE_HYPER;
        createHyperAnne();
        text.textContent = "Hyper Anne bought!";
        updateCounter();
    }
};

buyCannon.onclick = () => {
    if (spendableBoops >= PRICE_CONFETTI && !cannonBought) {
        spendableBoops -= PRICE_CONFETTI;
        cannonBought = true;
        text.textContent = "Confetti unlocked!";
        updateCounter();
    }
};

buyDuplicater.onclick = () => {
    if (spendableBoops >= PRICE_DUPLICATER && duplicaterLevel < 10) {
        spendableBoops -= PRICE_DUPLICATER;
        duplicaterLevel++;
        text.textContent = "Duplicater upgraded!";
        updateCounter();
    }
};

/* ===== AUTO BUTTONS ===== */

autoOneBtn.onclick = () => {
    if (spendableBoops >= PRICE_AUTO_ONE && autoTier < 1) {
        spendableBoops -= PRICE_AUTO_ONE;
        autoTier = 1;
        startAutoBoopers();
        text.textContent = "Auto Tier 1 unlocked!";
        updateCounter();
    }
};

autoTwoBtn.onclick = () => {
    if (spendableBoops >= PRICE_AUTO_TWO && autoTier < 2) {
        spendableBoops -= PRICE_AUTO_TWO;
        autoTier = 2;
        startAutoBoopers();
        text.textContent = "Auto Tier 2 unlocked!";
        updateCounter();
    }
};

autoThreeBtn.onclick = () => {
    if (spendableBoops >= PRICE_AUTO_THREE && autoTier < 3) {
        spendableBoops -= PRICE_AUTO_THREE;
        autoTier = 3;
        startAutoBoopers();
        text.textContent = "Auto Tier 3 unlocked!";
        updateCounter();
    }
};

/* ===== SAVE / LOAD ===== */

let memorySaves = {};

function saveData() {
    return {
        totalBoops,
        spendableBoops,
        duplicaterLevel,
        effectsBought,
        cannonBought,
        cheatCodeAdderUnlocked,
        imageChangerUnlocked,
        customMessagesUnlocked,
        currentImage,
        customMessages,
        usingCustomMessages,
        bouncingAnneCount,
        hyperBouncingBought,
        autoTier
    };
}

function saveGame() {
    const key = "anneSave" + saveSlot.value;
    const data = JSON.stringify(saveData());

    try {
        localStorage.setItem(key, data);
        text.textContent = "Saved!";
    } catch {
        memorySaves[key] = data;
        text.textContent = "Saved (temporary)";
    }
}

function loadGame() {
    const key = "anneSave" + saveSlot.value;

    let data = null;

    try {
        data = localStorage.getItem(key) || memorySaves[key];
    } catch {
        data = memorySaves[key];
    }

    if (!data) {
        text.textContent = "No save found.";
        return;
    }

    const save = JSON.parse(data);

    clearAutoBoopers();
    removeAllAnnes();

    totalBoops = save.totalBoops || 0;
    spendableBoops = save.spendableBoops || 0;
    duplicaterLevel = save.duplicaterLevel || 0;
    effectsBought = !!save.effectsBought;
    cannonBought = !!save.cannonBought;
    cheatCodeAdderUnlocked = !!save.cheatCodeAdderUnlocked;
    imageChangerUnlocked = !!save.imageChangerUnlocked;
    customMessagesUnlocked = !!save.customMessagesUnlocked;

    currentImage = save.currentImage || "Anne.png";
    img.src = currentImage;

    customMessages = save.customMessages || [];
    usingCustomMessages = !!save.usingCustomMessages;

    autoTier = save.autoTier || 0;

    for (let i = 0; i < (save.bouncingAnneCount || 0); i++) {
        createBouncingAnne();
    }

    if (save.hyperBouncingBought) {
        hyperBouncingBought = false;
        createHyperAnne();
    }

    startAutoBoopers();
    text.textContent = "Loaded!";
    updateCounter();
}

saveGameBtn.onclick = saveGame;
loadGameBtn.onclick = loadGame;

/* ===== CHEAT CODES ===== */

useCheat.onclick = event => {
    event.stopPropagation();

    const code = cheatInput.value.trim().toLowerCase();

    const give = n => {
        totalBoops += n;
        spendableBoops += n;
    };

    switch (code) {
        case "psych": give(1000); break;
        case "pimple": give(10000); break;
        case "rich": give(50000); break;

        case "boopgod":
            give(1000000);
            duplicaterLevel = 10;
            autoTier = 3;
            startAutoBoopers();
            break;

        case "max":
            duplicaterLevel = 10;
            break;

        case "bouncy":
            createBouncingAnne();
            break;

        case "bouncymax":
            while (bouncingAnneCount < maxBouncingAnnes) createBouncingAnne();
            break;

        case "hyper":
            if (!hyperBouncingBought) createHyperAnne();
            break;

        case "otherbouncy": // 🎯 EASTER EGG
            createOtherBouncyAnne();
            text.textContent = "✨ Easter Egg Anne spawned!";
            break;

        case "effects":
            effectsBought = true;
            break;

        case "cannon":
        case "confetti":
            cannonBought = true;
            break;

        case "auto1":
            autoTier = 1;
            startAutoBoopers();
            break;

        case "auto2":
            autoTier = 2;
            startAutoBoopers();
            break;

        case "auto3":
            autoTier = 3;
            startAutoBoopers();
            break;

        case "free":
            effectsBought = true;
            cannonBought = true;
            duplicaterLevel = 10;
            autoTier = 3;
            startAutoBoopers();

            while (bouncingAnneCount < maxBouncingAnnes) createBouncingAnne();
            if (!hyperBouncingBought) createHyperAnne();
            break;

        case "reset":
            location.reload();
            return;

        default:
            text.textContent = "Invalid code.";
            cheatInput.value = "";
            updateCounter();
            return;
    }

    cheatInput.value = "";
    text.textContent = "Cheat applied!";
    updateCounter();
};

/* ===== RESET ===== */

function triggerBlueScreenReset() {
    if (resetting) return;

    resetting = true;
    document.getElementById("blueScreen").style.display = "block";

    clearAutoBoopers();
    stopHyperIncome();

    setTimeout(() => {
        totalBoops = 0;
        spendableBoops = 0;
        duplicaterLevel = 0;
        effectsBought = false;
        cannonBought = false;
        autoTier = 0;
        cheatCodeAdderUnlocked = true;

        removeAllAnnes();

        document.body.classList.remove("cursed");
        document.getElementById("blueScreen").style.display = "none";

        resetting = false;
        text.textContent = "Reset... Cheats unlocked.";
        updateCounter();
    }, 4000);
}

/* ===== FIX UI CLICK BUG ===== */

["shop", "saveBox", "cheatBox", "hyperCodeBox"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    el.addEventListener("click", e => e.stopPropagation());
    el.addEventListener("pointerdown", e => e.stopPropagation());
});

/* ===== IDLE MESSAGE ===== */

setInterval(() => {
    if (!resetting && Date.now() - lastClickTime > 60000) {
        text.textContent = "Anne interrupts: " + getBoopMessage();
        lastClickTime = Date.now();
    }
}, 5000);

/* ===== START ===== */

updateCounter();
