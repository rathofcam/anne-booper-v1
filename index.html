<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anne Booper</title>

<style>
body {
    margin: 0;
    background: linear-gradient(45deg, lavender, pink, lightblue, #fff0f5);
    background-size: 400% 400%;
    animation: bgMove 8s infinite alternate;
    height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

@keyframes bgMove {
    0% { background-position: left; }
    100% { background-position: right; }
}

.cursed {
    animation: cursedBg 0.25s infinite;
    filter: contrast(1.4) saturate(2);
}

@keyframes cursedBg {
    0% { background: red; }
    25% { background: lime; }
    50% { background: purple; }
    75% { background: black; }
    100% { background: hotpink; }
}

/* ===== MAIN UI ===== */

#mainUI {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 20;
}

img {
    width: 420px;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 0 25px hotpink;
    transition: transform 0.2s ease;
}

img:hover {
    transform: scale(1.05);
}

.boop {
    animation: boopAnim 0.3s ease;
}

@keyframes boopAnim {
    50% { transform: scale(1.15) rotate(5deg); }
}

#text {
    margin-top: 15px;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    background: white;
    padding: 10px 14px;
    border-radius: 16px;
}

#counter {
    margin-top: 10px;
    font-size: 15px;
    font-weight: bold;
    background: rgba(255,255,255,0.8);
    padding: 8px 12px;
    border-radius: 12px;
}

/* ===== SHOP + UI ===== */

#shop, #saveBox, #cheatBox {
    display: none;
    margin-top: 12px;
    background: rgba(255,255,255,0.95);
    padding: 12px;
    border-radius: 16px;
    box-shadow: 0 0 16px hotpink;
    text-align: center;
}

button {
    margin: 4px;
    padding: 8px 10px;
    border-radius: 10px;
    border: none;
    background: hotpink;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:disabled {
    background: gray;
}

input, select {
    padding: 6px;
    border-radius: 8px;
    border: 2px solid hotpink;
}

/* ===== BOUNCING ANNES ===== */

.bouncingAnne {
    position: absolute;
    width: 130px;
    border-radius: 14px;
    box-shadow: 0 0 20px deeppink;
}

.hyperBouncingAnne {
    position: absolute;
    width: 150px;
    border-radius: 16px;
    box-shadow: 0 0 35px cyan;
}

/* ===== PARTICLES ===== */

.particle {
    position: absolute;
    font-size: 22px;
    pointer-events: none;
    animation: floatUp 1s forwards;
}

@keyframes floatUp {
    to {
        transform: translateY(-80px);
        opacity: 0;
    }
}

/* ===== HYPER CODE BOX ===== */

#hyperCodeBox {
    display: none;
    position: fixed;
    bottom: 12px;
    right: 12px;
    background: white;
    padding: 10px;
    border-radius: 14px;
    box-shadow: 0 0 15px cyan;
}

/* ===== BLUE SCREEN ===== */

#blueScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: #0078d7;
    color: white;
    font-family: monospace;
    padding: 40px;
    z-index: 9999;
}
</style>
</head>

<body>

<div id="blueScreen">
    <h1>:(</h1>
    <p>Your Anne Booper crashed.</p>
</div>

<div id="mainUI">
    <img id="anne" src="Anne.png">
    <div id="text">Click Anne 👆</div>
    <div id="counter">Boops: 0</div>

    <div id="shop">
        <h3>🛒 Shop</h3>
        <button id="buyBouncing">Bouncy Anne (15)</button>
        <button id="buyHyper">Hyper Anne (45)</button>
        <button id="buyCannon">Confetti (100)</button>
        <button id="buyDuplicater">Duplicater (50)</button>
    </div>

    <div id="saveBox">
        <select id="saveSlot"></select>
        <button id="saveGame">Save</button>
        <button id="loadGame">Load</button>
    </div>

    <div id="cheatBox">
        <input id="cheatInput">
        <button id="useCheat">Use Code</button>
    </div>
</div>

<div id="hyperCodeBox">
    <input id="hyperCodeInput" placeholder="Enter code">
    <button id="submitHyperCode">Unlock</button>
</div>

<script>

/* ===== MESSAGES ===== */

const messages = [
    "Psych time!",
    "I love to pop my pimples",
    "Emergency dopamine requested",
    "Anne.exe stopped working",
    "You’re addicted now",
    "Anne is multiplying",
    "Click faster",
    "The shop is alive",
    "Auto boopers incoming",
    "You need upgrades",
    "This is only the beginning",
    "Anne is judging your clicks",
    "You missed a boop. She noticed.",
    "This feels like a bad decision"
];/* ===== STATE ===== */

let totalBoops = 0;
let spendableBoops = 0;
let perClick = 1;

let effectsBought = false;
let cannonBought = false;
let duplicaterLevel = 0;

let cheatCodeAdderUnlocked = false;
let imageChangerUnlocked = false;
let customMessagesUnlocked = false;

let bouncingAnneCount = 0;
const maxBouncingAnnes = 15;
let bouncingAnnes = [];
let bounceAnimationId = null;

let hyperBouncingBought = false;
let hyperBouncingAnne = null;
let hyperInterval = null;

let autoTier = 0;
let autoOneInterval = null;
let autoTwoInterval = null;
let autoThreeInterval = null;

let resetting = false;
let lastClickTime = Date.now();

/* ===== ELEMENTS ===== */

const img = document.getElementById("anne");
const text = document.getElementById("text");
const counter = document.getElementById("counter");

const shop = document.getElementById("shop");
const saveBox = document.getElementById("saveBox");
const cheatBox = document.getElementById("cheatBox");

const buyBouncing = document.getElementById("buyBouncing");
const buyHyper = document.getElementById("buyHyper");
const buyCannon = document.getElementById("buyCannon");
const buyDuplicater = document.getElementById("buyDuplicater");

const saveSlot = document.getElementById("saveSlot");
const saveGameBtn = document.getElementById("saveGame");
const loadGameBtn = document.getElementById("loadGame");

const cheatInput = document.getElementById("cheatInput");
const useCheat = document.getElementById("useCheat");

const hyperCodeBox = document.getElementById("hyperCodeBox");
const hyperCodeInput = document.getElementById("hyperCodeInput");
const submitHyperCode = document.getElementById("submitHyperCode");

/* ===== SAVE SLOTS ===== */

for (let i = 1; i <= 50; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = "Save Slot " + i;
    saveSlot.appendChild(option);
}

/* ===== COUNTER / UI ===== */

function updateCounter() {
    perClick = Math.pow(2, duplicaterLevel);

    let autoText = "None";
    if (autoTier === 1) autoText = "Tier 1";
    if (autoTier === 2) autoText = "Tier 2";
    if (autoTier === 3) autoText = "Tier 3";

    counter.textContent =
        "Boops: " + Math.floor(totalBoops) +
        " | Spendable: " + Math.floor(spendableBoops) +
        " | Per Click: " + perClick +
        " | Bouncy Annes: " + bouncingAnneCount + "/15" +
        " | Auto: " + autoText;

    shop.style.display = totalBoops >= 75 ? "block" : "none";
    saveBox.style.display = totalBoops >= 75 ? "block" : "none";
    cheatBox.style.display = cheatCodeAdderUnlocked ? "block" : "none";

    buyBouncing.disabled = spendableBoops < 15 || bouncingAnneCount >= maxBouncingAnnes;
    buyHyper.disabled = spendableBoops < 45 || totalBoops < 45 || hyperBouncingBought;
    buyCannon.disabled = spendableBoops < 150 || cannonBought;
    buyDuplicater.disabled = spendableBoops < 500 || duplicaterLevel >= 10;
}

/* ===== PARTICLES ===== */

function showParticles(x, y) {
    if (!effectsBought) return;

    const symbols = ["✨", "💖", "💥", "🌸", "⭐", "💫"];

    for (let i = 0; i < 12; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        p.style.left = (x + Math.random() * 120 - 60) + "px";
        p.style.top = (y + Math.random() * 120 - 60) + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }
}

function confettiCannon() {
    const confetti = ["🎉", "🎊", "✨", "💥", "🌈"];

    for (let i = 0; i < 35; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.textContent = confetti[Math.floor(Math.random() * confetti.length)];
        p.style.left = Math.random() * window.innerWidth + "px";
        p.style.top = Math.random() * window.innerHeight + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }
}

/* ===== BOOPS ===== */

function addBoops(amount, fromAuto = false) {
    if (resetting) return;

    totalBoops += amount;
    spendableBoops += amount;

    if (totalBoops >= 100000 && totalBoops < 125000) {
        document.body.classList.add("cursed");
        if (!fromAuto) text.textContent = "wow. Real dedication.";
    }

    if (totalBoops >= 125000) {
        triggerBlueScreenReset();
        return;
    }

    updateCounter();
}

function boop(event) {
    if (resetting) return;

    lastClickTime = Date.now();

    addBoops(perClick, false);

    if (resetting) return;

    if (totalBoops >= 1000 && totalBoops < 1000 + perClick) {
        text.textContent = "STOP BOOPING ME IM PICKING MY ACNE!";
    } else if (totalBoops >= 75 && totalBoops < 75 + perClick) {
        text.textContent = "SHOP UNLOCKED!";
    } else if (totalBoops >= 45 && totalBoops < 45 + perClick) {
        text.textContent = "HYPER ANNE UNLOCKED!";
    } else {
        text.textContent = messages[Math.floor(Math.random() * messages.length)];
    }

    img.classList.add("boop");
    setTimeout(() => img.classList.remove("boop"), 300);

    const x = event.clientX || window.innerWidth / 2;
    const y = event.clientY || window.innerHeight / 2;

    showParticles(x, y);
    if (cannonBought) confettiCannon();

    updateCounter();
}

img.addEventListener("click", event => {
    event.stopPropagation();
    boop(event);
});

/* ===== HYPER CODE ===== */

submitHyperCode.onclick = () => {
    const code = hyperCodeInput.value.trim();

    if (code === "Hwi7k%") {
        cheatCodeAdderUnlocked = true;
        imageChangerUnlocked = true;
        customMessagesUnlocked = true;

        hyperCodeBox.style.display = "none";
        hyperCodeInput.value = "";

        text.textContent = "Hyper code accepted! Cheat Codes, Image Changer, and Custom Messages unlocked!";
        updateCounter();
    } else {
        text.textContent = "Wrong Hyper Anne code.";
    }
};

hyperCodeBox.addEventListener("click", event => event.stopPropagation());
hyperCodeInput.addEventListener("click", event => event.stopPropagation());
hyperCodeInput.addEventListener("pointerdown", event => event.stopPropagation());/* ===== BOUNCY ANNES ===== */

function createBouncingAnne() {
    if (bouncingAnneCount >= maxBouncingAnnes) return;

    const anne = {
        el: document.createElement("img"),
        x: Math.random() * (window.innerWidth - 130),
        y: Math.random() * (window.innerHeight - 130),
        dx: Math.random() > 0.5 ? 3 : -3,
        dy: Math.random() > 0.5 ? 3 : -3,
        size: 130
    };

    anne.el.src = "Anne.png";
    anne.el.className = "bouncingAnne";

    anne.el.addEventListener("click", e => {
        e.stopPropagation();
        boop(e);
    });

    document.body.appendChild(anne.el);

    bouncingAnnes.push(anne);
    bouncingAnneCount++;

    startBounceLoop();
    updateCounter();
}

/* ===== HYPER ANNE ===== */

function createHyperAnne() {
    if (hyperBouncingBought) return;

    hyperBouncingBought = true;

    hyperBouncingAnne = {
        el: document.createElement("img"),
        x: Math.random() * (window.innerWidth - 150),
        y: Math.random() * (window.innerHeight - 150),
        dx: 6,
        dy: 6,
        size: 150
    };

    hyperBouncingAnne.el.src = "Anne.png";
    hyperBouncingAnne.el.className = "hyperBouncingAnne";

    /* DOES NOT BOOP — opens code box */
    hyperBouncingAnne.el.addEventListener("click", e => {
        e.stopPropagation();
        hyperCodeBox.style.display = "block";
        hyperCodeInput.focus();
        text.textContent = "Enter the secret code.";
    });

    document.body.appendChild(hyperBouncingAnne.el);

    startHyperIncome();
    startBounceLoop();
    updateCounter();
}

/* ===== REMOVE ALL ===== */

function removeAllAnnes() {
    bouncingAnnes.forEach(a => a.el.remove());
    bouncingAnnes = [];
    bouncingAnneCount = 0;

    if (hyperBouncingAnne) {
        hyperBouncingAnne.el.remove();
        hyperBouncingAnne = null;
    }

    hyperBouncingBought = false;

    if (bounceAnimationId) {
        cancelAnimationFrame(bounceAnimationId);
        bounceAnimationId = null;
    }

    stopHyperIncome();
}

/* ===== BOUNCE LOOP ===== */

function startBounceLoop() {
    if (!bounceAnimationId) {
        bounceAnimationId = requestAnimationFrame(animateAnnes);
    }
}

function animateAnnes() {
    const all = [...bouncingAnnes];
    if (hyperBouncingAnne) all.push(hyperBouncingAnne);

    /* MOVE */
    all.forEach(a => {
        a.x += a.dx;
        a.y += a.dy;

        if (a.x <= 0 || a.x + a.size >= window.innerWidth) {
            a.dx *= -1;
            if (cannonBought) confettiCannon();
        }

        if (a.y <= 0 || a.y + a.size >= window.innerHeight) {
            a.dy *= -1;
            if (cannonBought) confettiCannon();
        }
    });

    /* COLLISIONS */
    for (let i = 0; i < all.length; i++) {
        for (let j = i + 1; j < all.length; j++) {
            const a = all[i];
            const b = all[j];

            const dx = (b.x + b.size/2) - (a.x + a.size/2);
            const dy = (b.y + b.size/2) - (a.y + a.size/2);
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < (a.size/2 + b.size/2) && dist > 0) {
                const nx = dx / dist;
                const overlap = (a.size/2 + b.size/2) - dist;

                a.x -= nx * overlap/2;
                b.x += nx * overlap/2;

                const tempX = a.dx;
                const tempY = a.dy;

                a.dx = b.dx;
                a.dy = b.dy;
                b.dx = tempX;
                b.dy = tempY;

                if (cannonBought) confettiCannon();
            }
        }
    }

    /* APPLY */
    all.forEach(a => {
        a.el.style.left = a.x + "px";
        a.el.style.top = a.y + "px";
    });

    if (all.length > 0) {
        bounceAnimationId = requestAnimationFrame(animateAnnes);
    } else {
        bounceAnimationId = null;
    }
}

/* ===== HYPER INCOME ===== */

function startHyperIncome() {
    stopHyperIncome();

    hyperInterval = setInterval(() => {
        addBoops(1, true);
    }, 60000);
}

function stopHyperIncome() {
    if (hyperInterval) {
        clearInterval(hyperInterval);
        hyperInterval = null;
    }
}/* ===== AUTO BOOPERS ===== */

function startAutoBoopers() {
    clearAutoBoopers();

    if (autoTier >= 1) {
        autoOneInterval = setInterval(() => addBoops(1, true), 5000);
    }

    if (autoTier >= 2) {
        autoTwoInterval = setInterval(() => addBoops(1, true), 1000);
    }

    if (autoTier >= 3) {
        autoThreeInterval = setInterval(() => addBoops(1, true), 50);
    }
}

function clearAutoBoopers() {
    if (autoOneInterval) clearInterval(autoOneInterval);
    if (autoTwoInterval) clearInterval(autoTwoInterval);
    if (autoThreeInterval) clearInterval(autoThreeInterval);

    autoOneInterval = null;
    autoTwoInterval = null;
    autoThreeInterval = null;
}

/* ===== SHOP BUTTONS ===== */

buyBouncing.onclick = () => {
    if (spendableBoops >= 15 && bouncingAnneCount < maxBouncingAnnes) {
        spendableBoops -= 15;
        createBouncingAnne();
        text.textContent = "Bouncy Anne bought!";
        updateCounter();
    }
};

buyHyper.onclick = () => {
    if (spendableBoops >= 45 && totalBoops >= 45 && !hyperBouncingBought) {
        spendableBoops -= 45;
        createHyperAnne();
        text.textContent = "Hyper Anne bought!";
        updateCounter();
    }
};

buyCannon.onclick = () => {
    if (spendableBoops >= 150 && !cannonBought) {
        spendableBoops -= 150;
        cannonBought = true;
        text.textContent = "Confetti unlocked!";
        updateCounter();
    }
};

buyDuplicater.onclick = () => {
    if (spendableBoops >= 500 && duplicaterLevel < 10) {
        spendableBoops -= 500;
        duplicaterLevel++;
        text.textContent = "Duplicater upgraded!";
        updateCounter();
    }
};

/* ===== EXTRA SHOP BUTTONS ADDED SAFELY ===== */

const autoOneBtn = document.createElement("button");
autoOneBtn.textContent = "Auto Booper I (1500)";
shop.appendChild(autoOneBtn);

const autoTwoBtn = document.createElement("button");
autoTwoBtn.textContent = "Auto Booper II (10000)";
shop.appendChild(autoTwoBtn);

const autoThreeBtn = document.createElement("button");
autoThreeBtn.textContent = "Auto Booper III (50000)";
shop.appendChild(autoThreeBtn);

autoOneBtn.onclick = () => {
    if (spendableBoops >= 1500 && autoTier < 1) {
        spendableBoops -= 1500;
        autoTier = 1;
        startAutoBoopers();
        text.textContent = "Auto Booper Tier 1 unlocked!";
        updateCounter();
    }
};

autoTwoBtn.onclick = () => {
    if (spendableBoops >= 10000 && autoTier < 2) {
        spendableBoops -= 10000;
        autoTier = 2;
        startAutoBoopers();
        text.textContent = "Auto Booper Tier 2 unlocked!";
        updateCounter();
    }
};

autoThreeBtn.onclick = () => {
    if (spendableBoops >= 50000 && autoTier < 3) {
        spendableBoops -= 50000;
        autoTier = 3;
        startAutoBoopers();
        text.textContent = "Auto Booper Tier 3 unlocked!";
        updateCounter();
    }
};

/* ===== SAVE / LOAD ===== */

let memorySaves = {};

function saveData() {
    return {
        totalBoops,
        spendableBoops,
        duplicaterLevel,
        effectsBought,
        cannonBought,
        cheatCodeAdderUnlocked,
        imageChangerUnlocked,
        customMessagesUnlocked,
        bouncingAnneCount,
        hyperBouncingBought,
        autoTier
    };
}

function saveGame() {
    const key = "anneBooperSave" + saveSlot.value;
    const data = JSON.stringify(saveData());

    try {
        localStorage.setItem(key, data);
        text.textContent = "Saved!";
    } catch {
        memorySaves[key] = data;
        text.textContent = "Saved temporarily!";
    }
}

function loadGame() {
    const key = "anneBooperSave" + saveSlot.value;

    let data = null;

    try {
        data = localStorage.getItem(key);
    } catch {
        data = memorySaves[key];
    }

    if (!data) {
        text.textContent = "No save found.";
        return;
    }

    const save = JSON.parse(data);

    clearAutoBoopers();
    removeAllAnnes();

    totalBoops = save.totalBoops || 0;
    spendableBoops = save.spendableBoops || 0;
    duplicaterLevel = save.duplicaterLevel || 0;
    effectsBought = !!save.effectsBought;
    cannonBought = !!save.cannonBought;
    cheatCodeAdderUnlocked = !!save.cheatCodeAdderUnlocked;
    imageChangerUnlocked = !!save.imageChangerUnlocked;
    customMessagesUnlocked = !!save.customMessagesUnlocked;
    autoTier = save.autoTier || 0;

    for (let i = 0; i < (save.bouncingAnneCount || 0); i++) {
        createBouncingAnne();
    }

    if (save.hyperBouncingBought) {
        hyperBouncingBought = false;
        createHyperAnne();
    }

    startAutoBoopers();
    text.textContent = "Loaded!";
    updateCounter();
}

saveGameBtn.onclick = saveGame;
loadGameBtn.onclick = loadGame;

/* ===== CHEAT CODES ===== */

useCheat.onclick = () => {
    const code = cheatInput.value.trim().toLowerCase();

    if (code === "psych") {
        totalBoops += 1000;
        spendableBoops += 1000;
        text.textContent = "+1000 boops!";
    } else if (code === "pimple") {
        totalBoops += 10000;
        spendableBoops += 10000;
        text.textContent = "+10000 boops!";
    } else if (code === "rich") {
        totalBoops += 50000;
        spendableBoops += 50000;
        text.textContent = "+50000 boops!";
    } else if (code === "boopgod") {
        totalBoops += 1000000;
        spendableBoops += 1000000;
        text.textContent = "+1000000 boops!";
    } else if (code === "max") {
        duplicaterLevel = 10;
        text.textContent = "Duplicater maxed!";
    } else if (code === "bouncy") {
        createBouncingAnne();
        text.textContent = "Free Bouncy Anne!";
    } else if (code === "bouncymax") {
        while (bouncingAnneCount < maxBouncingAnnes) createBouncingAnne();
        text.textContent = "Max Bouncy Annes!";
    } else if (code === "hyper") {
        totalBoops = Math.max(totalBoops, 45);
        spendableBoops += 45;
        if (!hyperBouncingBought) createHyperAnne();
        text.textContent = "Hyper Anne unlocked!";
    } else if (code === "effects") {
        effectsBought = true;
        text.textContent = "Effects unlocked!";
    } else if (code === "cannon" || code === "confetti") {
        cannonBought = true;
        text.textContent = "Confetti unlocked!";
    } else if (code === "auto1") {
        autoTier = 1;
        startAutoBoopers();
        text.textContent = "Auto 1 unlocked!";
    } else if (code === "auto2") {
        autoTier = 2;
        startAutoBoopers();
        text.textContent = "Auto 2 unlocked!";
    } else if (code === "auto3") {
        autoTier = 3;
        startAutoBoopers();
        text.textContent = "Auto 3 unlocked!";
    } else if (code === "free") {
        effectsBought = true;
        cannonBought = true;
        duplicaterLevel = 10;
        autoTier = 3;

        while (bouncingAnneCount < maxBouncingAnnes) createBouncingAnne();
        if (!hyperBouncingBought) createHyperAnne();

        startAutoBoopers();
        text.textContent = "Everything unlocked!";
    } else if (code === "reset") {
        totalBoops = 0;
        spendableBoops = 0;
        duplicaterLevel = 0;
        effectsBought = false;
        cannonBought = false;
        cheatCodeAdderUnlocked = false;
        imageChangerUnlocked = false;
        customMessagesUnlocked = false;
        autoTier = 0;

        clearAutoBoopers();
        removeAllAnnes();

        text.textContent = "Reset!";
    } else {
        text.textContent = "Invalid cheat code.";
    }

    cheatInput.value = "";
    updateCounter();
};

/* ===== BLUE SCREEN RESET ===== */

function triggerBlueScreenReset() {
    if (resetting) return;

    resetting = true;
    document.getElementById("blueScreen").style.display = "block";

    clearAutoBoopers();
    stopHyperIncome();

    setTimeout(() => {
        totalBoops = 0;
        spendableBoops = 0;
        duplicaterLevel = 0;
        effectsBought = false;
        cannonBought = false;
        autoTier = 0;
        cheatCodeAdderUnlocked = true;

        removeAllAnnes();

        document.body.classList.remove("cursed");
        document.getElementById("blueScreen").style.display = "none";

        resetting = false;
        text.textContent = "Game reset... Cheat codes unlocked.";
        updateCounter();
    }, 4000);
}

/* ===== IDLE MESSAGE ===== */

setInterval(() => {
    if (!resetting && Date.now() - lastClickTime >= 60000) {
        text.textContent = "Anne interrupts: " + messages[Math.floor(Math.random() * messages.length)];
        lastClickTime = Date.now();
    }
}, 5000);

/* ===== FINAL START ===== */

updateCounter();

<script>
/* ===== CLEAN CHEAT + HYPER CODE SYSTEM ===== */

(function () {

    const text = document.getElementById("text");
    const cheatBox = document.getElementById("cheatBox");
    const cheatInput = document.getElementById("cheatInput");
    const useCheat = document.getElementById("useCheat");

    const hyperBox = document.getElementById("hyperCodeBox");
    const hyperInput = document.getElementById("hyperCodeInput");
    const hyperBtn = document.getElementById("submitHyperCode");

    const mainUI = document.getElementById("mainUI");

    if (!text || !mainUI) return;

    /* ===== CREATE CHEAT BUTTON ===== */

    let cheatBtn = document.getElementById("cheatButton");

    if (!cheatBtn) {
        cheatBtn = document.createElement("button");
        cheatBtn.id = "cheatButton";
        cheatBtn.textContent = "🎁 Cheat Codes";
        cheatBtn.style.display = "none";
        mainUI.appendChild(cheatBtn);
    }

    cheatBtn.onclick = (e) => {
        e.stopPropagation();
        cheatBox.style.display = "block";
        cheatInput.focus();
        text.textContent = "Enter a cheat code.";
    };

    /* Show button only when unlocked */
    setInterval(() => {
        cheatBtn.style.display = (window.cheatCodeAdderUnlocked ? "inline-block" : "none");
    }, 300);

    /* ===== HYPER ANNE CODE ===== */

    if (hyperBtn) {
        hyperBtn.onclick = function () {
            const code = hyperInput.value.trim();

            if (code === "Hwi7k%") {
                window.cheatCodeAdderUnlocked = true;
                window.imageChangerUnlocked = true;
                window.customMessagesUnlocked = true;

                hyperBox.style.display = "none";
                hyperInput.value = "";

                text.textContent = "SECRET ACCEPTED: Cheat Codes + Custom Features unlocked!";
            } else {
                text.textContent = "Wrong code.";
            }
        };
    }

    /* Prevent clicks from breaking game */
    if (hyperBox) {
        hyperBox.addEventListener("click", e => e.stopPropagation());
        hyperBox.addEventListener("pointerdown", e => e.stopPropagation());
    }

    /* ===== CHEAT CODES ===== */

    if (useCheat) {
        useCheat.onclick = function (e) {
            e.stopPropagation();

            const code = cheatInput.value.trim().toLowerCase();

            function giveBoops(n) {
                window.totalBoops += n;
                window.spendableBoops += n;
            }

            switch (code) {

                case "psych":
                    giveBoops(1000);
                    text.textContent = "+1000 boops";
                    break;

                case "pimple":
                    giveBoops(10000);
                    text.textContent = "+10000 boops";
                    break;

                case "rich":
                    giveBoops(50000);
                    text.textContent = "+50000 boops";
                    break;

                case "boopgod":
                    giveBoops(1000000);
                    window.duplicaterLevel = 10;
                    window.autoTier = 3;
                    if (window.startAutoBoopers) startAutoBoopers();
                    text.textContent = "YOU ASCENDED";
                    break;

                case "max":
                    window.duplicaterLevel = 10;
                    text.textContent = "Duplicater MAX";
                    break;

                case "bouncy":
                    if (window.createBouncingAnne) createBouncingAnne();
                    text.textContent = "Bouncy spawned";
                    break;

                case "bouncymax":
                    while (window.bouncingAnneCount < window.maxBouncingAnnes) {
                        createBouncingAnne();
                    }
                    text.textContent = "MAX ANNES";
                    break;

                case "hyper":
                    if (!window.hyperBouncingBought && window.createHyperAnne) {
                        createHyperAnne();
                    }
                    text.textContent = "Hyper Anne unlocked";
                    break;

                case "effects":
                    window.effectsBought = true;
                    text.textContent = "Effects ON";
                    break;

                case "cannon":
                case "confetti":
                    window.cannonBought = true;
                    text.textContent = "Confetti ON";
                    break;

                case "auto1":
                    window.autoTier = 1;
                    if (window.startAutoBoopers) startAutoBoopers();
                    text.textContent = "Auto 1";
                    break;

                case "auto2":
                    window.autoTier = 2;
                    if (window.startAutoBoopers) startAutoBoopers();
                    text.textContent = "Auto 2";
                    break;

                case "auto3":
                    window.autoTier = 3;
                    if (window.startAutoBoopers) startAutoBoopers();
                    text.textContent = "Auto 3";
                    break;

                case "free":
                    window.effectsBought = true;
                    window.cannonBought = true;
                    window.duplicaterLevel = 10;
                    window.autoTier = 3;

                    if (window.startAutoBoopers) startAutoBoopers();

                    while (window.bouncingAnneCount < window.maxBouncingAnnes) {
                        createBouncingAnne();
                    }

                    if (!window.hyperBouncingBought) createHyperAnne();

                    text.textContent = "Everything unlocked";
                    break;

                case "reset":
                    location.reload();
                    break;

                default:
                    text.textContent = "Invalid code";
            }

            cheatInput.value = "";

            if (window.updateCounter) updateCounter();
        };
    }

})();
</script>
</body>
