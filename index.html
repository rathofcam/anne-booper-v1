<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anne Booper</title>

<style>
body {
    margin: 0;
    background: linear-gradient(45deg, lavender, pink, lightblue, #fff0f5);
    background-size: 400% 400%;
    animation: bgMove 8s infinite alternate;
    height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

@keyframes bgMove {
    0% { background-position: left; }
    100% { background-position: right; }
}

/* ===== MAIN UI ===== */

#mainUI {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    flex-direction: column;
    padding-top: 20px;
    z-index: 10;
}

#anne {
    width: 420px;
    max-width: 85vw;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 0 25px hotpink;
}

.boop {
    animation: boopAnim 0.25s ease;
}

@keyframes boopAnim {
    50% { transform: scale(1.15) rotate(4deg); }
}

#text, #counter {
    margin-top: 10px;
    background: white;
    padding: 10px;
    border-radius: 10px;
}

/* ===== SHOP ===== */

#shop {
    display: none;
    margin-top: 12px;
    background: white;
    padding: 12px;
    border-radius: 14px;
}

button {
    margin: 4px;
    padding: 8px;
    border-radius: 10px;
    border: none;
    background: hotpink;
    color: white;
}

/* ===== BOUNCING ===== */

.bouncingAnne {
    position: fixed;
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 14px;
    box-shadow: 0 0 20px deeppink;
    z-index: 5;
}

.hyperBouncingAnne {
    position: fixed;
    width: 140px;
    height: 140px;
    object-fit: cover;
    border-radius: 16px;
    box-shadow: 0 0 30px cyan;
    z-index: 6;
}
</style>
</head>

<body>

<div id="mainUI">
    <img id="anne" src="Anne.png">
    <div id="text">Click Anne 👆</div>
    <div id="counter">Boops: 0</div>

    <div id="shop">
        <button id="buyBouncing">Bouncy Anne (15)</button>
        <button id="buyHyper">Hyper Anne (45)</button>
        <button id="buyAuto">Auto Booper (1500)</button>
    </div>
</div>

<script>

/* ===== BASE ===== */

let totalBoops = 0;
let spendableBoops = 0;
let perClick = 1;

const img = document.getElementById("anne");
const text = document.getElementById("text");
const counter = document.getElementById("counter");

/* ===== AUTO BOOPER ===== */

let autoInterval = null;

function startAutoBooper() {
    if (autoInterval) clearInterval(autoInterval);

    autoInterval = setInterval(() => {
        totalBoops += 1;
        spendableBoops += 1;
        updateCounter();
    }, 1000);
}

/* ===== COUNTER ===== */

function updateCounter() {
    counter.textContent = "Boops: " + totalBoops + " | Spendable: " + spendableBoops;

    document.getElementById("shop").style.display =
        totalBoops >= 75 ? "block" : "none";
}

/* ===== BOOP ===== */

img.onclick = () => {
    totalBoops += perClick;
    spendableBoops += perClick;

    text.textContent = "Boop!";

    img.classList.add("boop");
    setTimeout(() => img.classList.remove("boop"), 200);

    updateCounter();
};

/* ===== BOUNCY ===== */

let bouncing = [];

function spawnBouncy(src = "Anne.png") {
    const el = document.createElement("img");
    el.src = src;
    el.className = "bouncingAnne";

    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;
    let dx = 3;
    let dy = 3;

    function move() {
        x += dx;
        y += dy;

        if (x <= 0 || x >= window.innerWidth - 120) dx *= -1;
        if (y <= 0 || y >= window.innerHeight - 120) dy *= -1;

        el.style.left = x + "px";
        el.style.top = y + "px";

        requestAnimationFrame(move);
    }

    move();

    el.onclick = e => {
        e.stopPropagation();
        totalBoops += 1;
        spendableBoops += 1;
        updateCounter();
    };

    document.body.appendChild(el);
}

/* ===== HYPER ANNE FIXED ===== */

function spawnHyperAnne() {
    const el = document.createElement("img");
    el.src = "Anne.png";
    el.className = "hyperBouncingAnne";

    let x = 200;
    let y = 200;
    let dx = 5;
    let dy = 5;

    function move() {
        x += dx;
        y += dy;

        if (x <= 0 || x >= window.innerWidth - 140) dx *= -1;
        if (y <= 0 || y >= window.innerHeight - 140) dy *= -1;

        el.style.left = x + "px";
        el.style.top = y + "px";

        requestAnimationFrame(move);
    }

    move();

    el.onclick = e => {
        e.stopPropagation();
        text.textContent = "Enter the secret code...";
    };

    document.body.appendChild(el);
}

/* ===== SHOP ===== */

document.getElementById("buyBouncing").onclick = () => {
    if (spendableBoops >= 15) {
        spendableBoops -= 15;
        spawnBouncy();
        updateCounter();
    }
};

document.getElementById("buyHyper").onclick = () => {
    if (spendableBoops >= 45) {
        spendableBoops -= 45;
        spawnHyperAnne();
        updateCounter();
    }
};

document.getElementById("buyAuto").onclick = () => {
    if (spendableBoops >= 1500) {
        spendableBoops -= 1500;
        startAutoBooper();
        text.textContent = "Auto Booper Activated!";
        updateCounter();
    }
};<script>
/* ===== 2/4 — UPGRADES + EFFECTS + COLLISIONS ===== */

/* ===== EXTRA STATE ===== */

let effectsBought = false;
let cannonBought = false;
let duplicaterLevel = 0;

let bouncyObjects = [];
let hyperObjects = [];

const PRICE_CONFETTI = 50;
const PRICE_DUPLICATER = 150;

/* ===== ADD MORE SHOP BUTTONS SAFELY ===== */

const shop = document.getElementById("shop");

const buyCannon = document.createElement("button");
buyCannon.id = "buyCannon";
buyCannon.textContent = "Confetti (50)";
shop.appendChild(buyCannon);

const buyDuplicater = document.createElement("button");
buyDuplicater.id = "buyDuplicater";
buyDuplicater.textContent = "Duplicater (150)";
shop.appendChild(buyDuplicater);

/* ===== PARTICLES ===== */

function showParticles(x, y) {
    if (!effectsBought) return;

    const symbols = ["✨", "💖", "💥", "🌸", "⭐", "💫"];

    for (let i = 0; i < 10; i++) {
        const p = document.createElement("div");
        p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        p.style.position = "fixed";
        p.style.left = (x + Math.random() * 100 - 50) + "px";
        p.style.top = (y + Math.random() * 100 - 50) + "px";
        p.style.fontSize = "24px";
        p.style.pointerEvents = "none";
        p.style.zIndex = "999";
        p.style.transition = "all 1s ease";
        document.body.appendChild(p);

        requestAnimationFrame(() => {
            p.style.transform = "translateY(-80px) scale(1.5)";
            p.style.opacity = "0";
        });

        setTimeout(() => p.remove(), 1000);
    }
}

function confettiCannon() {
    const confetti = ["🎉", "🎊", "✨", "💥", "🌈"];

    for (let i = 0; i < 30; i++) {
        const p = document.createElement("div");
        p.textContent = confetti[Math.floor(Math.random() * confetti.length)];
        p.style.position = "fixed";
        p.style.left = Math.random() * window.innerWidth + "px";
        p.style.top = Math.random() * window.innerHeight + "px";
        p.style.fontSize = "24px";
        p.style.pointerEvents = "none";
        p.style.zIndex = "999";
        p.style.transition = "all 1s ease";
        document.body.appendChild(p);

        requestAnimationFrame(() => {
            p.style.transform = "translateY(-90px) rotate(20deg) scale(1.5)";
            p.style.opacity = "0";
        });

        setTimeout(() => p.remove(), 1000);
    }
}

/* ===== UPGRADE MAIN BOOP ===== */

const oldMainClick = img.onclick;

img.onclick = e => {
    e.stopPropagation();

    perClick = Math.pow(2, duplicaterLevel);

    totalBoops += perClick;
    spendableBoops += perClick;

    text.textContent = "Boop +" + perClick + "!";

    img.classList.add("boop");
    setTimeout(() => img.classList.remove("boop"), 200);

    showParticles(e.clientX || window.innerWidth / 2, e.clientY || window.innerHeight / 2);

    if (cannonBought) {
        confettiCannon();
    }

    updateCounter();
};

/* ===== SHOP: CONFETTI + DUPLICATER ===== */

buyCannon.onclick = () => {
    if (spendableBoops >= PRICE_CONFETTI && !cannonBought) {
        spendableBoops -= PRICE_CONFETTI;
        cannonBought = true;
        effectsBought = true;
        text.textContent = "Confetti + effects unlocked!";
        updateCounter();
    }
};

buyDuplicater.onclick = () => {
    if (spendableBoops >= PRICE_DUPLICATER && duplicaterLevel < 10) {
        spendableBoops -= PRICE_DUPLICATER;
        duplicaterLevel++;
        perClick = Math.pow(2, duplicaterLevel);
        text.textContent = "Duplicater level " + duplicaterLevel + "!";
        updateCounter();
    }
};

/* ===== BETTER COUNTER ===== */

const oldUpdateCounter = updateCounter;

updateCounter = function () {
    perClick = Math.pow(2, duplicaterLevel);

    counter.textContent =
        "Boops: " + totalBoops +
        " | Spendable: " + spendableBoops +
        " | Per Click: " + perClick +
        " | Duplicater: " + duplicaterLevel + "/10";

    document.getElementById("shop").style.display =
        totalBoops >= 75 ? "block" : "none";

    buyCannon.disabled = cannonBought || spendableBoops < PRICE_CONFETTI;
    buyDuplicater.disabled = duplicaterLevel >= 10 || spendableBoops < PRICE_DUPLICATER;
};

/* ===== PATCH BOUNCY SPAWNS INTO OBJECT LIST ===== */

const oldSpawnBouncy = spawnBouncy;

spawnBouncy = function (src = "Anne.png") {
    const el = document.createElement("img");
    el.src = src;
    el.className = "bouncingAnne";

    let obj = {
        el,
        x: Math.random() * (window.innerWidth - 120),
        y: Math.random() * (window.innerHeight - 120),
        dx: Math.random() > 0.5 ? 3 : -3,
        dy: Math.random() > 0.5 ? 3 : -3,
        size: 120
    };

    el.onclick = e => {
        e.stopPropagation();
        totalBoops += perClick;
        spendableBoops += perClick;
        text.textContent = "Bouncy boop +" + perClick + "!";
        updateCounter();
    };

    document.body.appendChild(el);
    bouncyObjects.push(obj);

    startPhysicsLoop();
};

/* ===== PATCH HYPER SPAWN INTO OBJECT LIST ===== */

spawnHyperAnne = function () {
    const el = document.createElement("img");
    el.src = "Anne.png";
    el.className = "hyperBouncingAnne";

    let obj = {
        el,
        x: 200,
        y: 200,
        dx: 5,
        dy: 5,
        size: 140
    };

    el.onclick = e => {
        e.stopPropagation();
        text.textContent = "Hyper Anne wants the secret code...";
    };

    document.body.appendChild(el);
    hyperObjects.push(obj);

    startPhysicsLoop();
};

/* ===== PHYSICS LOOP ===== */

let physicsRunning = false;

function startPhysicsLoop() {
    if (physicsRunning) return;
    physicsRunning = true;
    requestAnimationFrame(physicsLoop);
}

function physicsLoop() {
    const all = [...bouncyObjects, ...hyperObjects];

    all.forEach(a => {
        a.x += a.dx;
        a.y += a.dy;

        if (a.x <= 0 || a.x + a.size >= window.innerWidth) {
            a.dx *= -1;
            a.x = Math.max(0, Math.min(a.x, window.innerWidth - a.size));
            if (cannonBought) confettiCannon();
        }

        if (a.y <= 0 || a.y + a.size >= window.innerHeight) {
            a.dy *= -1;
            a.y = Math.max(0, Math.min(a.y, window.innerHeight - a.size));
            if (cannonBought) confettiCannon();
        }
    });

    /* Anne-to-Anne collisions */
    for (let i = 0; i < all.length; i++) {
        for (let j = i + 1; j < all.length; j++) {
            const a = all[i];
            const b = all[j];

            const ax = a.x + a.size / 2;
            const ay = a.y + a.size / 2;
            const bx = b.x + b.size / 2;
            const by = b.y + b.size / 2;

            const dx = bx - ax;
            const dy = by - ay;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = (a.size + b.size) / 2;

            if (dist < minDist && dist > 0) {
                const tempDX = a.dx;
                const tempDY = a.dy;

                a.dx = b.dx;
                a.dy = b.dy;
                b.dx = tempDX;
                b.dy = tempDY;
            }
        }
    }

    all.forEach(a => {
        a.el.style.left = a.x + "px";
        a.el.style.top = a.y + "px";
    });

    if (all.length > 0) {
        requestAnimationFrame(physicsLoop);
    } else {
        physicsRunning = false;
    }
}

updateCounter();
/* ===== 3/4 — SAVE + CHEATS + IMAGE CHANGER + CUSTOM MESSAGES ===== */

/* ===== SAVE SYSTEM ===== */

let memorySaves = {};

function saveData() {
    return {
        totalBoops,
        spendableBoops,
        duplicaterLevel,
        effectsBought,
        cannonBought,
        autoTier,
        currentImage,
        customMessages,
        usingCustomMessages,
        bouncyObjects: bouncyObjects.length,
        hyperObjects: hyperObjects.length
    };
}

function saveGame() {
    const key = "anneSave" + saveSlot.value;
    const data = JSON.stringify(saveData());

    try {
        localStorage.setItem(key, data);
        text.textContent = "Saved!";
    } catch {
        memorySaves[key] = data;
        text.textContent = "Saved (temporary)";
    }
}

function loadGame() {
    const key = "anneSave" + saveSlot.value;

    let data = null;

    try {
        data = localStorage.getItem(key) || memorySaves[key];
    } catch {
        data = memorySaves[key];
    }

    if (!data) {
        text.textContent = "No save found.";
        return;
    }

    const save = JSON.parse(data);

    totalBoops = save.totalBoops || 0;
    spendableBoops = save.spendableBoops || 0;
    duplicaterLevel = save.duplicaterLevel || 0;
    effectsBought = !!save.effectsBought;
    cannonBought = !!save.cannonBought;
    autoTier = save.autoTier || 0;

    currentImage = save.currentImage || "Anne.png";
    img.src = currentImage;

    customMessages = save.customMessages || [];
    usingCustomMessages = !!save.usingCustomMessages;

    /* RESET OBJECTS */
    bouncyObjects.forEach(o => o.el.remove());
    hyperObjects.forEach(o => o.el.remove());
    bouncyObjects = [];
    hyperObjects = [];

    for (let i = 0; i < (save.bouncyObjects || 0); i++) {
        spawnBouncy(currentImage);
    }

    for (let i = 0; i < (save.hyperObjects || 0); i++) {
        spawnHyperAnne();
    }

    startAutoBoopers();
    text.textContent = "Loaded!";
    updateCounter();
}

/* hook buttons */
document.getElementById("saveGame").onclick = saveGame;
document.getElementById("loadGame").onclick = loadGame;

/* ===== CHEAT SYSTEM ===== */

const cheatInput = document.getElementById("cheatInput");
const useCheat = document.getElementById("useCheat");

useCheat.onclick = e => {
    e.stopPropagation();

    const code = cheatInput.value.trim().toLowerCase();

    const give = n => {
        totalBoops += n;
        spendableBoops += n;
    };

    switch (code) {
        case "psych": give(1000); break;
        case "pimple": give(10000); break;
        case "rich": give(50000); break;

        case "boopgod":
            give(1000000);
            duplicaterLevel = 10;
            autoTier = 3;
            startAutoBoopers();
            break;

        case "max":
            duplicaterLevel = 10;
            break;

        case "bouncy":
            spawnBouncy(currentImage);
            break;

        case "bouncymax":
            for (let i = 0; i < 15; i++) spawnBouncy(currentImage);
            break;

        case "hyper":
            spawnHyperAnne();
            break;

        case "otherbouncy":
            spawnBouncy("anne3.png");
            text.textContent = "✨ Easter Egg Anne!";
            break;

        case "effects":
            effectsBought = true;
            break;

        case "cannon":
        case "confetti":
            cannonBought = true;
            break;

        case "auto1":
            autoTier = 1;
            startAutoBoopers();
            break;

        case "auto2":
            autoTier = 2;
            startAutoBoopers();
            break;

        case "auto3":
            autoTier = 3;
            startAutoBoopers();
            break;

        case "free":
            effectsBought = true;
            cannonBought = true;
            duplicaterLevel = 10;
            autoTier = 3;
            startAutoBoopers();
            for (let i = 0; i < 15; i++) spawnBouncy(currentImage);
            spawnHyperAnne();
            break;

        case "reset":
            location.reload();
            return;

        default:
            text.textContent = "Invalid code.";
            cheatInput.value = "";
            return;
    }

    cheatInput.value = "";
    text.textContent = "Cheat applied!";
    updateCounter();
};

/* ===== IMAGE CHANGER ===== */

let currentImage = "Anne.png";

function setAnneImage(src) {
    currentImage = src;
    img.src = src;

    bouncyObjects.forEach(o => o.el.src = src);
    hyperObjects.forEach(o => o.el.src = src);
}

document.getElementById("img1").onclick = () => setAnneImage("Anne.png");
document.getElementById("img2").onclick = () => setAnneImage("anne2.png");
document.getElementById("img3").onclick = () => setAnneImage("anne3.png");
document.getElementById("img4").onclick = () => setAnneImage("anne4.png");

/* ===== CUSTOM MESSAGES ===== */

let customMessages = [];
let usingCustomMessages = false;

const customInput = document.getElementById("customInput");

document.getElementById("addMsg").onclick = () => {
    const val = customInput.value.trim();
    if (!val) return;

    customMessages.push(val);
    customInput.value = "";
    text.textContent = "Message added!";

document.getElementById("toggleCustom").onclick = () => {
    usingCustomMessages = !usingCustomMessages;
    text.textContent = usingCustomMessages
        ? "Using custom messages."
        : "Using default messages.";

const oldMsg = text.textContent;

function getMessage() {
    if (usingCustomMessages && customMessages.length > 0) {
        return customMessages[Math.floor(Math.random() * customMessages.length)];
    }
    return messages[Math.floor(Math.random() * messages.length)];

/* patch boop */
const oldBoop = img.onclick;
img.onclick = e => {
    e.stopPropagation();

    perClick = Math.pow(2, duplicaterLevel);
    totalBoops += perClick;
    spendableBoops += perClick;

    text.textContent = getMessage();

    img.classList.add("boop");

updateCounter();
<script>
/* ===== 4/4 — FINAL FIXES + HYPER FIX + AUTO FIX + CLEANUP ===== */

/* ===== FIX: AUTO BOOPERS (BROKEN BEFORE) ===== */

function startAutoBoopers() {
    clearAutoBoopers();

    if (autoTier >= 1) {
        autoOneInterval = setInterval(() => addBoops(1, true), 5000);
    }
    if (autoTier >= 2) {
        autoTwoInterval = setInterval(() => addBoops(1, true), 1000);
    }
    if (autoTier >= 3) {
        autoThreeInterval = setInterval(() => addBoops(1, true), 50);
    }
}

function clearAutoBoopers() {
    if (autoOneInterval) clearInterval(autoOneInterval);
    if (autoTwoInterval) clearInterval(autoTwoInterval);
    if (autoThreeInterval) clearInterval(autoThreeInterval);

    autoOneInterval = null;
    autoTwoInterval = null;
    autoThreeInterval = null;
}

/* ===== FIX: ADD BOOPS FUNCTION ===== */

function addBoops(amount, fromAuto = false) {
    totalBoops += amount;
    spendableBoops += amount;

    if (!fromAuto) {
        text.textContent = "+" + amount + " boops!";
    }

    updateCounter();
}

/* ===== FIX: HYPER ANNE (NO BACKGROUND BUG + ALWAYS MOVES) ===== */

spawnHyperAnne = function () {
    const el = document.createElement("img");

    el.src = currentImage || "Anne.png";
    el.className = "hyperBouncingAnne";

    let obj = {
        el,
        x: Math.random() * (window.innerWidth - 140),
        y: Math.random() * (window.innerHeight - 140),
        dx: (Math.random() > 0.5 ? 5 : -5),
        dy: (Math.random() > 0.5 ? 5 : -5),
        size: 140
    };

    el.onclick = e => {
        e.stopPropagation();

        document.getElementById("hyperCodeBox").style.display = "block";
        text.textContent = "Enter the secret code.";
    };

    document.body.appendChild(el);
    hyperObjects.push(obj);

    startPhysicsLoop();
};

/* ===== FIX: PHYSICS LOOP SAFETY ===== */

const oldPhysicsLoop = physicsLoop;

physicsLoop = function () {
    const all = [...bouncyObjects, ...hyperObjects];

    all.forEach(a => {
        a.x += a.dx;
        a.y += a.dy;

        if (a.x <= 0 || a.x + a.size >= window.innerWidth) {
            a.dx *= -1;
            a.x = Math.max(0, Math.min(a.x, window.innerWidth - a.size));
        }

        if (a.y <= 0 || a.y + a.size >= window.innerHeight) {
            a.dy *= -1;
            a.y = Math.max(0, Math.min(a.y, window.innerHeight - a.size));
        }
    });

    for (let i = 0; i < all.length; i++) {
        for (let j = i + 1; j < all.length; j++) {
            const a = all[i];
            const b = all[j];

            const dx = (b.x + b.size / 2) - (a.x + a.size / 2);
            const dy = (b.y + b.size / 2) - (a.y + a.size / 2);
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = (a.size + b.size) / 2;

            if (dist < minDist && dist > 0) {
                const nx = dx / dist;
                const ny = dy / dist;

                const overlap = minDist - dist;

                a.x -= nx * overlap / 2;
                a.y -= ny * overlap / 2;
                b.x += nx * overlap / 2;
                b.y += ny * overlap / 2;

                const tempDX = a.dx;
                const tempDY = a.dy;

                a.dx = b.dx;
                a.dy = b.dy;
                b.dx = tempDX;
                b.dy = tempDY;
            }
        }
    }

    all.forEach(a => {
        a.el.style.left = a.x + "px";
        a.el.style.top = a.y + "px";
    });

    if (all.length > 0) {
        requestAnimationFrame(physicsLoop);
    } else {
        physicsRunning = false;
    }
};
